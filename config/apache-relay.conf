# config/apache-relay.conf — ตัวอย่าง Apache VirtualHost สำหรับ relay.benyapol.online
# ทำหน้าที่เป็น reverse proxy ส่งต่อไปยัง Node server (localhost:3000)
#
# วิธีใช้ (XAMPP/Windows):
#   1. เปิดใช้งาน module เหล่านี้ใน httpd.conf (เอา comment ออก):
#        LoadModule proxy_module modules/mod_proxy.so
#        LoadModule proxy_http_module modules/mod_proxy_http.so
#        LoadModule proxy_wstunnel_module modules/mod_proxy_wstunnel.so
#        LoadModule rewrite_module modules/mod_rewrite.so
#        LoadModule ssl_module modules/mod_ssl.so
#        LoadModule headers_module modules/mod_headers.so
#   2. Include ไฟล์นี้ใน httpd.conf หรือ httpd-ssl.conf:
#        Include "C:/xampp/htdocs/relay/config/apache-relay.conf"
#   3. เพิ่มบรรทัดนี้ใน C:\Windows\System32\drivers\etc\hosts:
#        127.0.0.1  relay.benyapol.online
#   4. รีสตาร์ท Apache และ Node (npm start) แล้วเข้า https://relay.benyapol.online

# ---------- HTTP: เปลี่ยนเส้นทางไป HTTPS ----------
<VirtualHost *:80>
    ServerName relay.benyapol.online
    RewriteEngine On
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# ---------- HTTPS: reverse proxy ไปยัง Node ----------
<VirtualHost *:443>
    ServerName relay.benyapol.online

    # ใส่เส้นทางใบรับรอง SSL ของคุณ (เช่น mkcert หรือ Let's Encrypt)
    SSLEngine on
    SSLCertificateFile      "C:/xampp/apache/conf/ssl.crt/server.crt"
    SSLCertificateKeyFile   "C:/xampp/apache/conf/ssl.key/server.key"

    # สำคัญมาก: ส่งต่อ WebSocket (Socket.io) ให้ถูกต้อง
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://127.0.0.1:3000/$1" [P,L]

    # Proxy ทั่วไป (HTTP) → Node
    ProxyPreserveHost On
    ProxyPass        /socket.io/ http://127.0.0.1:3000/socket.io/
    ProxyPassReverse /socket.io/ http://127.0.0.1:3000/socket.io/
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # ตั้ง timeout ยาวหน่อย (รองรับการส่งไฟล์ใหญ่/การรอ signaling)
    ProxyTimeout 3600
</VirtualHost>
